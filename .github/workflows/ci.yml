name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  golden-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test workspace
        run: cargo test --workspace

  typecheck-golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install TypeScript
        run: npm install -g typescript
      - name: Typecheck golden files
        run: ./scripts/typecheck_golden.sh

  test-library-mode:
    needs: lint-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build library-mode fixture and run golden test
        run: just test-library

  build-runtime-artifacts:
    needs: lint-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: binding_tests/pnpm-lock.yaml
      - name: Build WASM fixtures and generate TypeScript bindings
        run: ./scripts/build_bindings.sh
      - name: FFI golden tests (WASM now available)
        run: cargo test -p uniffi-bindgen-js golden_ffi_
      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: binding_tests/generated

  test-bindings-runtime:
    needs: build-runtime-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-artifacts
          path: binding_tests/generated
      - name: Install JS dependencies
        run: cd binding_tests && pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: cd binding_tests && pnpm typecheck
      - name: Run JS smoke tests
        run: cd binding_tests && pnpm test
